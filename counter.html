<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카운터 앱</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-2xl p-8 w-80">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">카운터 앱</h1>

        <div class="bg-blue-50 rounded-lg p-8 mb-8 border-2 border-blue-200">
            <div class="text-6xl font-bold text-center text-blue-600" id="counter">0</div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
            <button onclick="increment()" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-105">
                +1
            </button>
            <button onclick="decrement()" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-105">
                -1
            </button>
        </div>

        <button onclick="reset()" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-105">
            리셋
        </button>
    </div>

    <script>
        let count = 0;

        function updateDisplay() {
            document.getElementById('counter').textContent = count;
        }

        function increment() {
            count++;
            updateDisplay();
        }

        function decrement() {
            count--;
            updateDisplay();
        }

        function reset() {
            count = 0;
            updateDisplay();
        }
    </script>
</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Your Name - Full Stack Developer Portfolio</title>
    <meta name="title" content="Your Name - Full Stack Developer Portfolio" />
    <meta name="description" content="Discover my portfolio of web development projects built with React, TypeScript, and modern web technologies. Showcasing my skills in full-stack development." />
    <meta name="keywords" content="developer, portfolio, react, typescript, web development, full stack" />
    <meta name="author" content="Your Name" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourportfolio.com/" />
    <meta property="og:title" content="Your Name - Full Stack Developer Portfolio" />
    <meta property="og:description" content="Discover my portfolio of web development projects built with React, TypeScript, and modern web technologies." />
    <meta property="og:image" content="https://yourportfolio.com/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://yourportfolio.com/" />
    <meta property="twitter:title" content="Your Name - Full Stack Developer Portfolio" />
    <meta property="twitter:description" content="Discover my portfolio of web development projects built with React, TypeScript, and modern web technologies." />
    <meta property="twitter:image" content="https://yourportfolio.com/og-image.png" />

    <!-- Instagram -->
    <meta property="instagram:url" content="https://instagram.com/yourname" />
    <meta name="instagram:site" content="@yourname" />

    <!-- YouTube -->
    <meta property="youtube:url" content="https://youtube.com/@yourname" />
    <meta property="youtube:channel_id" content="UCxxxxxxxxxxxxxxxx" />

    <!-- Additional -->
    <meta name="theme-color" content="#0ea5e9" />
    <meta name="color-scheme" content="light dark" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>할 일 목록 앱</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen py-8 px-4">
    <div class="max-w-md mx-auto">
        <!-- 제목 -->
        <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">📝 할 일 목록</h1>

        <!-- 메인 카드 -->
        <div class="bg-white rounded-lg shadow-lg p-6">
            <!-- 입력 영역 -->
            <div class="flex gap-2 mb-6">
                <input
                    type="text"
                    id="todoInput"
                    placeholder="새로운 할 일을 입력하세요..."
                    class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
                    onkeypress="handleKeyPress(event)"
                >
                <button
                    onclick="addTodo()"
                    class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-lg transition duration-200"
                >
                    추가
                </button>
            </div>

            <!-- 할 일 목록 -->
            <div id="todoList" class="space-y-2">
                <!-- 할 일 항목들이 여기에 추가됨 -->
            </div>

            <!-- 빈 상태 메시지 -->
            <div id="emptyMessage" class="text-center text-gray-400 py-8">
                할 일을 추가해보세요! ✨
            </div>

            <!-- 통계 -->
            <div class="mt-6 pt-6 border-t border-gray-200 text-sm text-gray-600">
                <p>전체: <span id="totalCount" class="font-bold text-gray-800">0</span></p>
                <p>완료: <span id="completeCount" class="font-bold text-green-600">0</span></p>
            </div>
        </div>
    </div>

    <script>
        // 할 일 배열 (로컬 스토리지에서 불러옴)
        let todos = JSON.parse(localStorage.getItem('todos')) || [];

        // 페이지 로드 시 할 일 목록 표시
        document.addEventListener('DOMContentLoaded', renderTodos);

        /**
         * 새로운 할 일을 추가하는 함수
         */
        function addTodo() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();

            // 입력값이 비어있으면 경고
            if (text === '') {
                alert('할 일을 입력해주세요!');
                return;
            }

            // 새로운 할 일 객체 생성
            const newTodo = {
                id: Date.now(), // 고유 ID (현재 시간 사용)
                text: text,
                completed: false
            };

            // 배열에 추가
            todos.push(newTodo);

            // 로컬 스토리지에 저장
            saveTodos();

            // 입력 필드 비우기
            input.value = '';
            input.focus();

            // 화면 업데이트
            renderTodos();
        }

        /**
         * 할 일을 완료 상태로 토글하는 함수
         * @param {number} id - 할 일의 고유 ID
         */
        function toggleTodo(id) {
            // 해당 할 일을 찾아서 completed 상태 반전
            const todo = todos.find(t => t.id === id);
            if (todo) {
                todo.completed = !todo.completed;
                saveTodos();
                renderTodos();
            }
        }

        /**
         * 할 일을 삭제하는 함수
         * @param {number} id - 할 일의 고유 ID
         */
        function deleteTodo(id) {
            // 해당 할 일을 배열에서 제거
            todos = todos.filter(t => t.id !== id);
            saveTodos();
            renderTodos();
        }

        /**
         * 할 일 목록을 화면에 렌더링하는 함수
         */
        function renderTodos() {
            const todoList = document.getElementById('todoList');
            const emptyMessage = document.getElementById('emptyMessage');
            const totalCount = document.getElementById('totalCount');
            const completeCount = document.getElementById('completeCount');

            // 할 일 목록 초기화
            todoList.innerHTML = '';

            // 할 일이 없으면 빈 메시지 표시
            if (todos.length === 0) {
                emptyMessage.style.display = 'block';
                totalCount.textContent = '0';
                completeCount.textContent = '0';
                return;
            }

            // 빈 메시지 숨기기
            emptyMessage.style.display = 'none';

            // 각 할 일 항목을 DOM에 추가
            todos.forEach(todo => {
                const todoItem = document.createElement('div');
                todoItem.className = 'flex items-center gap-3 p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition';

                // 체크박스
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.checked = todo.completed;
                checkbox.className = 'w-5 h-5 text-blue-500 rounded cursor-pointer focus:ring-2 focus:ring-blue-500';
                checkbox.onchange = () => toggleTodo(todo.id);

                // 텍스트 (완료되면 줄그음)
                const textSpan = document.createElement('span');
                textSpan.textContent = todo.text;
                textSpan.className = `flex-1 ${todo.completed ? 'line-through text-gray-400' : 'text-gray-800'}`;

                // 삭제 버튼
                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = '✕';
                deleteBtn.className = 'text-red-500 hover:text-red-700 font-bold px-2 py-1 hover:bg-red-50 rounded transition';
                deleteBtn.onclick = () => deleteTodo(todo.id);

                // 항목에 요소들 추가
                todoItem.appendChild(checkbox);
                todoItem.appendChild(textSpan);
                todoItem.appendChild(deleteBtn);

                // 목록에 추가
                todoList.appendChild(todoItem);
            });

            // 통계 업데이트
            totalCount.textContent = todos.length;
            completeCount.textContent = todos.filter(t => t.completed).length;
        }

        /**
         * 로컬 스토리지에 할 일 저장하는 함수
         */
        function saveTodos() {
            localStorage.setItem('todos', JSON.stringify(todos));
        }

        /**
         * Enter 키를 누르면 할 일 추가하는 함수
         * @param {KeyboardEvent} event - 키보드 이벤트
         */
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                addTodo();
            }
        }
    </script>
</body>
</html>
